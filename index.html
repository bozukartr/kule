<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0f1a" />
  <title>Stack Versus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH ─────────────────────────────────────────── -->
  <div id="screen-auth" class="screen active">
    <div class="logo">
      <span class="logo-stack">STACK</span>
      <span class="logo-vs">VS</span>
    </div>
    <p class="tagline">Place blocks. Outlast your rival.</p>
    <div class="card">
      <button id="btn-google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="or-divider"><span>or</span></div>
      <button id="btn-anon" class="btn-ghost">Play as Guest</button>
    </div>
    <p id="auth-error" class="auth-error"></p>
  </div>

  <!-- ── MENU ──────────────────────────────────────────── -->
  <div id="screen-menu" class="screen">
    <div id="user-bar">
      <img id="user-avatar" src="" alt="avatar" />
      <div id="user-info">
        <span id="user-label">Playing as</span>
        <span id="user-display">Player</span>
      </div>
      <button id="btn-signout" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="logo">
      <span class="logo-stack">STACK</span>
      <span class="logo-vs">VS</span>
    </div>
    <div class="card">
      <div id="nickname-row">
        <input id="player-name" type="text" placeholder="Your nickname" maxlength="14" autocomplete="off" />
      </div>
      <button id="btn-play" class="btn-primary">FIND MATCH</button>
    </div>
  </div>

  <!-- ── QUEUE ─────────────────────────────────────────── -->
  <div id="screen-queue" class="screen">
    <div class="spinner"></div>
    <p class="queue-text">Finding opponent…</p>
    <button id="btn-cancel" class="btn-ghost">Cancel</button>
  </div>

  <!-- ── GAME ──────────────────────────────────────────── -->
  <div id="screen-game" class="screen">
    <div id="hud">
      <div class="hud-player" id="hud-me">
        <img id="hud-avatar" src="" alt="" />
        <div class="hud-texts">
          <span class="hud-name" id="my-name">You</span>
          <span class="hud-score" id="my-score">0</span>
        </div>
      </div>
      <div id="hud-vs">VS</div>
      <div class="hud-player hud-right" id="hud-opp">
        <div class="hud-texts">
          <span class="hud-name" id="opp-name">Rival</span>
          <span class="hud-score" id="opp-score">0</span>
        </div>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="tap-hint">TAP TO PLACE</div>
  </div>

  <!-- ── RESULT ────────────────────────────────────────── -->
  <div id="screen-result" class="screen">
    <div id="result-icon"></div>
    <h2 id="result-title"></h2>
    <div id="result-scores"></div>
    <button id="btn-again" class="btn-primary">PLAY AGAIN</button>
    <button id="btn-menu" class="btn-ghost">Menu</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="game.js"></script>
</body>
</html>
